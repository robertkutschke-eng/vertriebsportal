<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Vertrieb Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.3.136/pdf.min.mjs" type="module"></script>
<style>
:root{
  --bg:#07111d; --panel:#0d1828; --panel2:#122238; --line:#1f3654; --text:#eef5ff; --muted:#9bb0ce;
  --blue:#53a5ff; --blue2:#1f6dd6; --green:#19c37d; --orange:#f59e0b; --red:#ef4444; --violet:#8b5cf6;
  --header-h:58px; --sidebar-w:260px; --bottom-h:74px; --radius:18px; --shadow:0 10px 30px rgba(0,0,0,.25);
}
*{box-sizing:border-box}
html,body{margin:0;background:linear-gradient(180deg,#07111d,#08131f 40%,#091522);color:var(--text);font-family:Inter,Arial,sans-serif;min-height:100%}
body{min-height:100dvh}
a{color:#8bc0ff}
button,input,select,textarea{font:inherit}
#app{min-height:100dvh;display:grid;grid-template-rows:var(--header-h) 1fr}
header{position:sticky;top:0;z-index:20;height:var(--header-h);display:flex;align-items:center;justify-content:space-between;padding:0 16px;background:rgba(10,19,32,.92);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}
.brand{display:flex;align-items:center;gap:12px}
.brand-badge{width:36px;height:36px;border-radius:12px;background:linear-gradient(135deg,var(--blue2),var(--blue));display:grid;place-items:center;font-weight:800}
.brand-title{font-weight:800}.brand-sub{font-size:11px;color:var(--muted)}
.layout{display:grid;grid-template-columns:1fr;min-height:0}
aside{display:none;background:rgba(9,17,29,.85);border-right:1px solid var(--line);padding:18px 14px 18px;overflow:auto}
main{min-width:0;min-height:0;overflow:auto;padding:16px;padding-bottom:calc(var(--bottom-h) + 18px)}
.nav{display:grid;gap:8px}
.nav button,nav.bottom button{border:1px solid transparent;background:transparent;color:var(--muted);border-radius:14px;padding:12px 12px;text-align:left;font-weight:700;cursor:pointer}
.nav button.active,nav.bottom button.active{background:linear-gradient(180deg,#12243c,#102034);color:#fff;border-color:#274564}
nav.bottom{position:fixed;left:0;right:0;bottom:0;height:var(--bottom-h);display:grid;grid-template-columns:repeat(7,1fr);gap:6px;padding:8px 10px calc(8px + env(safe-area-inset-bottom));background:rgba(10,19,32,.95);backdrop-filter:blur(14px);border-top:1px solid var(--line);z-index:30}
nav.bottom button{text-align:center;font-size:11px;padding:8px 4px}
.screen{display:none}.screen.active{display:block}
.section-head{display:flex;justify-content:space-between;align-items:flex-end;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.section-head h2{margin:0;font-size:26px}.section-head p{margin:6px 0 0;color:var(--muted);font-size:13px}
.grid{display:grid;gap:14px}.grid-2{grid-template-columns:1fr}.grid-3{grid-template-columns:1fr}.grid-4{grid-template-columns:1fr}
.card,.kpi,.hero{background:linear-gradient(180deg,rgba(16,30,49,.98),rgba(12,24,40,.98));border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
.card{padding:16px;margin-bottom:14px}.hero{padding:18px 18px 16px;margin-bottom:16px}.hero h1{margin:0 0 6px;font-size:28px}.hero p{margin:0;color:var(--muted)}
.kpi{padding:16px}.kpi .label{font-size:11px;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);font-weight:800}.kpi .value{font-size:30px;font-weight:800;margin:8px 0 3px}.kpi .sub{font-size:12px;color:var(--muted)}
.row{display:flex;flex-wrap:wrap;gap:10px}.row>*{flex:1 1 190px}.row-tight>*{flex:1 1 140px}
label{display:block;margin:0 0 6px;font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.45px}
input,select,textarea{width:100%;padding:12px 13px;border-radius:14px;border:1px solid var(--line);background:var(--panel2);color:var(--text)}
textarea{min-height:92px;resize:vertical}
button{border:0;border-radius:14px;padding:11px 16px;font-weight:800;cursor:pointer}
.btn-primary{background:linear-gradient(135deg,var(--blue2),var(--blue));color:#fff}
.btn-secondary{background:#162940;color:#fff}
.btn-success{background:#0f4b34;color:#fff}
.btn-danger{background:#4b1920;color:#fff}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--line)}
.item{background:rgba(10,20,34,.92);border:1px solid var(--line);border-radius:16px;padding:14px}
.item h4{margin:0 0 6px;font-size:18px}.meta{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;color:var(--muted);font-size:13px}
.badge{display:inline-flex;align-items:center;padding:4px 10px;border-radius:999px;font-size:12px;font-weight:800}
.b-blue{background:#1e3757;color:#8fc2ff}.b-green{background:#153c28;color:#82f3b6}.b-orange{background:#4d3209;color:#ffd57d}.b-red{background:#4a1820;color:#ff9ba7}.b-violet{background:#352055;color:#c7a8ff}
.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}.toolbar>*{flex:1 1 220px}
.small{font-size:12px;color:var(--muted)} .muted{color:var(--muted)}
.empty{padding:22px;border:1px dashed var(--line);border-radius:16px;text-align:center;color:var(--muted)}
.list{display:grid;gap:12px}
.filelist{display:grid;gap:8px;margin-top:8px}
.filepill{display:flex;justify-content:space-between;align-items:center;gap:10px;background:#0d1828;border:1px solid var(--line);border-radius:12px;padding:8px 10px}
.pdftext{white-space:pre-wrap;max-height:170px;overflow:auto;background:#0a1320;border:1px solid var(--line);border-radius:12px;padding:10px;font-size:12px;color:#c9daf5}
.split{display:grid;grid-template-columns:1fr;gap:14px}
.quick{display:grid;grid-template-columns:1fr;gap:12px}
hr.soft{border:0;border-top:1px solid var(--line);margin:14px 0}
.warn{background:#3c2d0a;border:1px solid #6a4b0f;color:#ffdb90;border-radius:14px;padding:12px 14px;margin-bottom:12px}
.ok{background:#103324;border:1px solid #1f6947;color:#9ef1c4;border-radius:14px;padding:12px 14px;margin-bottom:12px}
.table{width:100%;border-collapse:collapse}.table th,.table td{padding:8px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top;font-size:13px}.table th{color:var(--muted);font-size:12px;text-transform:uppercase}
@media (min-width:780px){
  .grid-2{grid-template-columns:repeat(2,minmax(0,1fr))}
  .grid-3{grid-template-columns:repeat(3,minmax(0,1fr))}
  .grid-4{grid-template-columns:repeat(2,minmax(0,1fr))}
  .split{grid-template-columns:1.05fr .95fr}
}
@media (min-width:1120px){
  #app{grid-template-columns:var(--sidebar-w) 1fr;grid-template-rows:var(--header-h) 1fr}
  header{grid-column:1 / -1}
  .layout{grid-column:1 / -1;grid-template-columns:var(--sidebar-w) 1fr}
  aside{display:block}
  main{padding:22px 24px 24px}
  nav.bottom{display:none}
  .grid-4{grid-template-columns:repeat(4,minmax(0,1fr))}
  .quick{grid-template-columns:repeat(3,minmax(0,1fr))}
}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="brand">
      <div class="brand-badge">VP</div>
      <div>
        <div class="brand-title">Vertrieb Pro</div>
        <div class="brand-sub">AS Technical Solution GmbH</div>
      </div>
    </div>
    <div class="small">lokale Version · schnelle Eingabe</div>
  </header>
  <div class="layout">
    <aside>
      <div class="nav" id="sideNav"></div>
      <div class="warn" style="margin-top:16px">PDF-Textlesen funktioniert bei normalen Text-PDFs. Reine Scan-PDFs brauchen OCR und liefern hier oft keinen brauchbaren Text.</div>
    </aside>
    <main>
      <section id="dashboard" class="screen active"></section>
      <section id="leads" class="screen"></section>
      <section id="anfragen" class="screen"></section>
      <section id="maschinen" class="screen"></section>
      <section id="videos" class="screen"></section>
      <section id="spesen" class="screen"></section>
      <section id="kalender" class="screen"></section>
      <section id="wochenbericht" class="screen"></section>
    </main>
  </div>
  <nav class="bottom" id="bottomNav"></nav>
</div>
<script>
const NAVS=[
  ['dashboard','Start'],['leads','Leads'],['anfragen','Anfragen'],['maschinen','Maschinen'],['videos','Videos'],['spesen','Spesen'],['kalender','Kalender'],['wochenbericht','Bericht']
];
const DBKEY='vertrieb_pro_plus_v2';
const currentWeekKey = getISOWeekKey(new Date());
const state = normalizeState(load()||{});
purgeTransientData();
renderNav();
renderAll();

function normalizeState(s){
  return {
    leads:Array.isArray(s.leads)?s.leads:[],
    anfragen:Array.isArray(s.anfragen)?s.anfragen:[],
    videos:Array.isArray(s.videos)?s.videos:[],
    hersteller:Array.isArray(s.hersteller)?s.hersteller:['GRAEF','Zermat','Bastra'],
    maschinenDocs:Array.isArray(s.maschinenDocs)?s.maschinenDocs:[],
    spesen:Array.isArray(s.spesen)?s.spesen:[],
    spesenMonatsdocs:Array.isArray(s.spesenMonatsdocs)?s.spesenMonatsdocs:[],
    wochenberichte:Array.isArray(s.wochenberichte)?s.wochenberichte:[],
    termine:Array.isArray(s.termine)?s.termine:[],
    kalenderFocus:s.kalenderFocus||null,
    kalenderMonth:s.kalenderMonth || new Date().toISOString().slice(0,7),
    kalenderEditId:s.kalenderEditId||null
  };
}
function load(){try{return JSON.parse(localStorage.getItem(DBKEY));}catch(e){return null}}
function save(){localStorage.setItem(DBKEY, JSON.stringify(state));}
function uid(){return Math.random().toString(36).slice(2)+Date.now().toString(36)}
function monthKey(dateStr){ const d=new Date(dateStr); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; }
function monthLabel(key){ const [y,m]=key.split('-'); return new Date(Number(y),Number(m)-1,1).toLocaleDateString('de-DE',{month:'long',year:'numeric'}); }
function euro(v){ return Number(v||0).toLocaleString('de-DE',{minimumFractionDigits:2,maximumFractionDigits:2})+' €'; }
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[m]))}
function strip(s){return String(s||'').toLowerCase();}
function getISOWeekKey(d){
  const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  const dayNum = date.getUTCDay() || 7;
  date.setUTCDate(date.getUTCDate() + 4 - dayNum);
  const yearStart = new Date(Date.UTC(date.getUTCFullYear(),0,1));
  const weekNo = Math.ceil((((date - yearStart) / 86400000) + 1) / 7);
  return `${date.getUTCFullYear()}-KW${String(weekNo).padStart(2,'0')}`;
}
function keepLast3Months(list, getDate){
  const now=new Date();
  const allowed=[];
  for(let i=0;i<3;i++){
    const d=new Date(now.getFullYear(), now.getMonth()-i, 1);
    allowed.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`);
  }
  return list.filter(x=>allowed.includes(getDate(x)));
}
function purgeTransientData(){
  state.spesen = keepLast3Months(state.spesen, x=>x.monat || monthKey(x.datum));
  state.spesenMonatsdocs = keepLast3Months(state.spesenMonatsdocs, x=>x.monat);
  state.wochenberichte = state.wochenberichte.filter(x=>x.kw===currentWeekKey);
  save();
}
function renderNav(){
  const side=document.getElementById('sideNav');
  const bottom=document.getElementById('bottomNav');
  const html = NAVS.map(([id,label],i)=>`<button class="${i===0?'active':''}" data-screen="${id}">${label}</button>`).join('');
  side.innerHTML=html; bottom.innerHTML=html;
  document.querySelectorAll('[data-screen]').forEach(btn=>btn.onclick=()=>showScreen(btn.dataset.screen));
}
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.toggle('active',s.id===id));
  document.querySelectorAll('[data-screen]').forEach(b=>b.classList.toggle('active',b.dataset.screen===id));
}
function renderAll(){renderDashboard();renderCRM('leads','Leads',state.leads);renderCRM('anfragen','Anfragen',state.anfragen);renderMaschinen();renderVideos();renderSpesen();renderKalender();renderWochenbericht();}

function badge(text,type='blue'){return `<span class="badge b-${type}">${esc(text)}</span>`}

function renderDashboard(){
  const today = new Date().toISOString().slice(0,10);
  const spMonat = keepLast3Months(state.spesen, x=>x.monat||monthKey(x.datum)).filter(x=>x.monat===monthKey(today)||monthKey(x.datum)===monthKey(today));
  const wochen = state.wochenberichte.filter(x=>x.kw===currentWeekKey);
  const html = `
    <div class="hero">
      <h1>Vertrieb im Griff</h1>
      <p>Schnelle Eingabe für Kunden, Maschinen, Videos, Spesen und Wochenberichte.</p>
    </div>
    <div class="grid grid-4">
      <div class="kpi"><div class="label">Leads</div><div class="value">${state.leads.length}</div><div class="sub">aktive Kundeneinträge</div></div>
      <div class="kpi"><div class="label">Anfragen</div><div class="value">${state.anfragen.length}</div><div class="sub">offene Vorgänge</div></div>
      <div class="kpi"><div class="label">Videos</div><div class="value">${state.videos.length}</div><div class="sub">verknüpfte Kundenlinks</div></div>
      <div class="kpi"><div class="label">Spesen Monat</div><div class="value">${euro(spMonat.reduce((a,b)=>a+Number(b.betrag||0),0))}</div><div class="sub">${monthLabel(monthKey(today))}</div></div>
    </div>
    <div class="grid quick" style="margin-top:14px">
      <div class="card"><div class="section-head"><div><h2>Kaltaquise</h2><p>Direkter Einstieg für neue Kontakte.</p></div></div><div class="row"><button class="btn-primary" onclick="showScreen('leads');document.getElementById('leadFirma')?.focus()">Lead anlegen</button><button class="btn-secondary" onclick="showScreen('anfragen');document.getElementById('anfrageFirma')?.focus()">Anfrage anlegen</button></div></div>
      <div class="card"><div class="section-head"><div><h2>Videos</h2><p>Links pro Firma speichern und suchen.</p></div></div><div class="row"><button class="btn-primary" onclick="showScreen('videos');document.getElementById('videoFirma')?.focus()">Video-Link hinzufügen</button></div></div>
      <div class="card"><div class="section-head"><div><h2>Kalender</h2><p>Alle Erinnerungen und Termine im Überblick.</p></div></div><div class="row"><button class="btn-primary" onclick="showScreen('kalender')">Kalender öffnen</button></div></div>
      <div class="card"><div class="section-head"><div><h2>Wochenbericht</h2><p>${currentWeekKey} · ${wochen.length} Einträge</p></div></div><div class="row"><button class="btn-primary" onclick="showScreen('wochenbericht');document.getElementById('wbFirma')?.focus()">Bericht öffnen</button></div></div>
    </div>`;
  document.getElementById('dashboard').innerHTML=html;
}

function renderCRM(screenId,title,list){
  const el=document.getElementById(screenId);
  const isLead=screenId==='leads';
  const prefix=isLead?'lead':'anfrage';
  const singular = isLead ? 'Lead' : 'Anfrage';
  const searchPlaceholder = title+' suchen';
  el.innerHTML=`
    <div class="section-head"><div><h2>${title}</h2><p>Kunden mit PDFs, Suchfunktion, automatischer Texterkennung und internem Kalender.</p></div></div>
    <div class="split">
      <div class="card">
        <div class="row">
          <div><label>Firma</label><input id="${prefix}Firma" /></div>
          <div><label>Ansprechpartner</label><input id="${prefix}Kontakt" /></div>
        </div>
        <div class="row">
          <div><label>Telefon</label><input id="${prefix}Tel" /></div>
          <div><label>E-Mail</label><input id="${prefix}Mail" /></div>
        </div>
        <div class="row">
          <div><label>Straße</label><input id="${prefix}Adresse" /></div>
          <div><label>PLZ</label><input id="${prefix}Plz" /></div>
          <div><label>Ort</label><input id="${prefix}Ort" /></div>
        </div>
        <div class="row">
          <div><label>Status</label><select id="${prefix}Status"><option>Neu</option><option>Kontaktiert</option><option>Angebot</option><option>Nachfassen</option></select></div>
          <div><label>Interesse</label><input id="${prefix}Interesse" placeholder="z. B. GRAEF" /></div>
          <div><label>Bereich / Produkt</label><input id="${prefix}Produkt" placeholder="z. B. Aufschnittschneidmaschinen" /></div>
        </div>
        <div class="row">
          <div><label>Datum</label><input id="${prefix}Datum" type="date" /></div>
          <div><label>Uhrzeit</label><input id="${prefix}Uhrzeit" type="time" /></div>
        </div>
        <div><label>Nächster Schritt</label><input id="${prefix}Next" placeholder="z. B. nach Ostern anrufen" /></div>
        <div class="row">
          <div><label>Angebotsnummer</label><input id="${prefix}AngebotNr" placeholder="z. B. A-2026-104" /></div>
          <div><label>Erinnerung Datum</label><input id="${prefix}RemDate" type="date" /></div>
          <div><label>Erinnerung Uhrzeit</label><input id="${prefix}RemTime" type="time" /></div>
        </div>
        <div><label>Automatische Kundenübersicht</label><textarea id="${prefix}Overview" readonly placeholder="Wird automatisch aus Text, PDF und Feldern aufgebaut."></textarea></div>
        <div><label>Bericht</label><textarea id="${prefix}Bericht" placeholder="Bericht / Gesprächsinhalt für ${singular}."></textarea></div>
        <div><label>Quelltext / Notiz</label><textarea id="${prefix}Notiz" placeholder="Text einfügen oder frei schreiben – die App zieht die Daten direkt in die Felder."></textarea></div>
        <div class="small" style="margin:8px 0 0">AS Technical Solution wird bei der Erkennung ignoriert. Datum, Uhrzeit, Interesse, Produkt und nächster Schritt werden wenn möglich direkt aus dem Text übernommen.</div>
        <div style="margin-top:10px"><label>PDF-Dateien</label><input id="${prefix}Pdf" type="file" accept="application/pdf" multiple /></div>
        <div class="small" style="margin:8px 0 10px">PDF-Inhalt wird bei normalen Text-PDFs gelesen und in Felder und Suche übernommen.</div>
        <div class="row auto"><button class="btn-secondary" id="${prefix}Parse">Text in Felder übernehmen</button><button class="btn-primary" id="${prefix}Save">${singular} speichern</button></div>
      </div>
      <div>
        <div class="toolbar"><input id="${prefix}Search" placeholder="${searchPlaceholder}" /></div>
        <div id="${prefix}List" class="list"></div>
      </div>
    </div>`;

  const softParse = ()=>applyParsedDataToForm(prefix, null, false);
  const hardParse = ()=>applyParsedDataToForm(prefix, null, true);
  document.getElementById(prefix+'Parse').onclick = hardParse;
  document.getElementById(prefix+'Notiz').addEventListener('blur', softParse);
  document.getElementById(prefix+'Search').oninput=()=>renderCRMList(prefix,list);
  document.getElementById(prefix+'Pdf').addEventListener('change', async()=>{
    const parsedPdfs = await readPdfFiles(document.getElementById(prefix+'Pdf').files);
    document.getElementById(prefix+'Pdf').dataset.parsed = JSON.stringify(parsedPdfs);
    applyParsedDataToForm(prefix, parsedPdfs, false);
  });

  document.getElementById(prefix+'Save').onclick=async()=>{
    let pdfs = [];
    try{ pdfs = JSON.parse(document.getElementById(prefix+'Pdf').dataset.parsed || '[]'); }catch(e){ pdfs=[]; }
    if(!pdfs.length) pdfs = await readPdfFiles(document.getElementById(prefix+'Pdf').files);
    const rawNotiz=val(prefix+'Notiz');
    const rawBericht=val(prefix+'Bericht');
    const mergedText=[rawNotiz, ...pdfs.map(p=>p.text||'')].filter(Boolean).join('\n');
    const extracted=extractCustomerData(mergedText);
    const firma=val(prefix+'Firma')||extracted.firma;
    if(!firma) return alert('Firma fehlt');
    const kontakt=val(prefix+'Kontakt')||extracted.kontakt;
    const tel=normalizePhone(val(prefix+'Tel')||extracted.tel);
    const mail=(val(prefix+'Mail')||extracted.mail||'').toLowerCase();
    const adresse=val(prefix+'Adresse')||extracted.adresse||'';
    const plz=val(prefix+'Plz')||extracted.plz||'';
    const ort=val(prefix+'Ort')||extracted.ort||'';
    const datum=val(prefix+'Datum')||extracted.datum||'';
    const uhrzeit=val(prefix+'Uhrzeit')||extracted.uhrzeit||'';
    const interesse=val(prefix+'Interesse')||extracted.interesse||'';
    const produkt=val(prefix+'Produkt')||extracted.produkt||'';
    const nextStep=val(prefix+'Next')||extracted.naechsterSchritt||'';
    const angebotNr=val(prefix+'AngebotNr')||extracted.angebotNr||'';
    const reminderDate=val(prefix+'RemDate')||extracted.reminderDate||datum||'';
    const reminderTime=val(prefix+'RemTime')||extracted.reminderTime||uhrzeit||'';
    const uebersicht=buildCustomerOverview({firma,kontakt,tel,mail,adresse,plz,ort,datum,uhrzeit,interesse,produkt,nextStep});
    list.unshift({
      id:uid(),
      firma, kontakt, tel, mail, status:val(prefix+'Status'),
      ort, adresse, plz,
      datum, uhrzeit,
      interesse, produkt,
      nextStep,
      angebotNr,
      reminderDate, reminderTime,
      uebersicht,
      bericht: rawBericht || rawNotiz || '',
      notiz:rawNotiz,
      pdfs,
      erstellt:new Date().toISOString()
    });
    save();
    renderCRM(screenId,title,list);
    renderDashboard();
    if(reminderDate){
      openCalendarForRecord({
        titel:`${singular}: ${firma}`,
        firma, kontakt, ort,
        datum: reminderDate,
        uhrzeit: reminderTime,
        nextStep: nextStep || `Follow-up ${singular.toLowerCase()}`,
        angebotNr,
        notiz: rawNotiz
      });
    }
  };
  renderCRMList(prefix,list);
}
function renderCRMList(prefix,list){
  const q=strip(val(prefix+'Search'));
  const container=document.getElementById(prefix+'List');
  const filtered=list.filter(x=>{

function normalizeLines(text){
  return (text||'').replace(/\r/g,'').split('\n').map(s=>s.trim()).filter(Boolean);
}
function isOwnCompanyLine(line){
  return /as\s*technical\s*solution/i.test(line) || /sendenhorst/i.test(line) || /industrieweg\s*13[-–]?15/i.test(line) || /www\.as-technical\.de/i.test(line);
}
function cleanExtractValue(v){
  return String(v||'').replace(/\s+/g,' ').replace(/[|;]/g,' ').trim();
}
function normalizePhone(v){
  return cleanExtractValue(v).replace(/[^\d+]/g,' ').replace(/\s+/g,' ').trim();
}
function parseGermanDate(value){
  const v = cleanExtractValue(value);
  if(!v) return '';
  if(/^\d{4}-\d{2}-\d{2}$/.test(v)) return v;
  const m = v.match(/\b(\d{1,2})[.\-/](\d{1,2})[.\-/](\d{2,4})\b/);
  if(!m) return '';
  let year = m[3];
  if(year.length===2) year = '20'+year;
  return `${year.padStart(4,'0')}-${String(m[2]).padStart(2,'0')}-${String(m[1]).padStart(2,'0')}`;
}
function parseTimeValue(value){
  const m = String(value||'').match(/\b(\d{1,2})[:.](\d{2})\b/);
  if(!m) return '';
  return `${String(m[1]).padStart(2,'0')}:${m[2]}`;
}
function extractLabelValue(text, labels){
  const lines = normalizeLines(text);
  for(const line of lines){
    for(const label of labels){
      const re = new RegExp('^'+label+'\\s*:?\\s*(.+)$','i');
      const m = line.match(re);
      if(m) return cleanExtractValue(m[1]);
    }
  }
  const flat = text.replace(/\n/g,' ');
  for(const label of labels){
    const re = new RegExp(label+'\\s*:?\\s*([^\\[]+?)(?=(?:\\s+[A-ZÄÖÜa-zäöüß][\\w./() -]{1,25}:)|$)','i');
    const m = flat.match(re);
    if(m) return cleanExtractValue(m[1]);
  }
  return '';
}
function pickFirstExternalCompany(lines){
  for(const line of lines){
    if(isOwnCompanyLine(line)) continue;
    if(/^(sehr geehrte|hallo|mail|telefon|tel\.?|e-?mail|mobil|ansprechpartner|kontakt|datum|uhrzeit|betreff|kn\.nr|kom\.nr|sn\s*nr|servicetechniker)/i.test(line)) continue;
    if(line.length<3) continue;
    if(/gmbh|kg|ag|ug|mbh|fleischerei|landschlachterei|schlachterei|metzgerei|bäckerei|baeckerei|bistro|hotel|gbr|e\.k\.|\bek\b|ohg|restaurant|imbiss/i.test(line)) return line;
  }
  return '';
}
function extractInterestBlock(text){
  const compact = text.replace(/\n/g,' ').replace(/\s+/g,' ').trim();
  const match = compact.match(/\[X\]\s*([A-ZÄÖÜ0-9]+)\s*\(([^)]+)\)\s*([^[]*?)(?=(?:\[\s*[X ]\s*\])|Angebot\s+zusenden|Rechnung\s+zusenden|Ort:|Datum:|$)/i);
  if(!match) return {interesse:'', produkt:'', naechsterSchritt:''};
  return {
    interesse: cleanExtractValue(match[1]),
    produkt: cleanExtractValue(match[2]),
    naechsterSchritt: cleanExtractValue(match[3]).replace(/^[-–:]+/,'').trim()
  };
}
function extractCustomerData(text){
  const lines=normalizeLines(text).filter(line=>!isOwnCompanyLine(line));
  const cleanText=lines.join('\n');
  const mail=(cleanText.match(/[A-Z0-9._%+-]+@[A-Z0-9.-]+\.[A-Z]{2,}/ig)||[]).find(m=>!/as-technical\.de/i.test(m))||'';
  const tel=normalizePhone(extractLabelValue(cleanText,['Telefon','Tel']) || ((cleanText.match(/(?:\+49|0)[\d\s\/()-]{6,}/g)||[]).map(s=>s.replace(/\s+/g,' ').trim()).find(Boolean)) || '');
  let firma=cleanExtractValue(extractLabelValue(cleanText,['Kunde','Firma'])) || pickFirstExternalCompany(lines);
  let kontakt=cleanExtractValue(extractLabelValue(cleanText,['Name','Ansprechpartner','Kontakt']));
  if(!kontakt){
    const mr=cleanText.match(/(?:herr|frau)\s+([A-ZÄÖÜ][a-zäöüß]+(?:\s+[A-ZÄÖÜ][a-zäöüß]+){0,2})/i);
    if(mr) kontakt=mr[1].trim();
  }
  let adresse=cleanExtractValue(extractLabelValue(cleanText,['Strasse','Straße','Adresse']));
  let plz=''; let ort='';
  const ortVal = cleanExtractValue(extractLabelValue(cleanText,['PLZ\/Ort','Ort']));
  const ortMatch = ortVal.match(/(\d{5})\s+(.+)/);
  if(ortMatch){
    plz=ortMatch[1];
    ort=ortMatch[2].trim();
  } else {
    ort=ortVal;
  }
  if(!plz || !ort){
    for(let i=0;i<lines.length;i++){
      const l=lines[i];
      const m=l.match(/\b(\d{5})\s+([A-Za-zÄÖÜäöüß].+)$/);
      if(m){
        plz = plz || m[1];
        ort = ort || m[2].trim();
        if(!adresse && i>0 && /\d+/.test(lines[i-1]) && !isOwnCompanyLine(lines[i-1]) && !/telefon|tel|mail|e-?mail/i.test(lines[i-1])) adresse = lines[i-1];
        break;
      }
    }
  }
  if(adresse && /telefon|tel|mail|e-?mail/i.test(adresse)) adresse='';
  if(!firma && kontakt){
    const idx=lines.findIndex(l=>l.includes(kontakt));
    if(idx>0) firma=pickFirstExternalCompany(lines.slice(0,idx));
  }
  const datum=parseGermanDate(extractLabelValue(cleanText,['Datum']));
  const uhrzeit=parseTimeValue(extractLabelValue(cleanText,['Uhrzeit','Zeit']));
  const servicetechniker=cleanExtractValue(extractLabelValue(cleanText,['Servicetechniker']));
  const angebotNr=cleanExtractValue(extractLabelValue(cleanText,['Angebotsnummer','Angebot Nr','Angebot-Nr','Angebotnr']));
  const interest = extractInterestBlock(cleanText);
  let nextStep = interest.naechsterSchritt || cleanExtractValue(extractLabelValue(cleanText,['Nächster Schritt','Naechster Schritt']));
  if(!nextStep){
    const free = cleanText.match(/(?:anrufen|rückrufen|rueckrufen|nachfassen|termin|vorstellen|demo|angebot zusenden)[^.\n]*/i);
    if(free) nextStep = cleanExtractValue(free[0]);
  }
  return {
    firma,kontakt,tel,mail,ort,adresse,plz,datum,uhrzeit,servicetechniker,angebotNr,
    interesse: interest.interesse || '',
    produkt: interest.produkt || '',
    naechsterSchritt: nextStep || '',
    reminderDate: datum || '',
    reminderTime: uhrzeit || ''
  };
}
function buildCustomerOverview(data){
  const out=[];
  if(data.firma) out.push('Kunde: '+data.firma);
  if(data.kontakt) out.push('Ansprechpartner: '+data.kontakt);
  if(data.tel) out.push('Telefon: '+data.tel);
  if(data.mail) out.push('E-Mail: '+data.mail);
  const addr=[data.adresse, [data.plz,data.ort].filter(Boolean).join(' ')].filter(Boolean).join(', ');
  if(addr) out.push('Adresse: '+addr);
  if(data.datum || data.uhrzeit) out.push('Termin: '+[data.datum,data.uhrzeit].filter(Boolean).join(' · '));
  if(data.interesse || data.produkt) out.push('Interesse: '+[data.interesse,data.produkt].filter(Boolean).join(' · '));
  if(data.nextStep) out.push('Nächster Schritt: '+data.nextStep);
  if(data.angebotNr) out.push('Angebotsnummer: '+data.angebotNr);
  return out.join('\n');
}
function applyParsedDataToForm(prefix, parsedPdfs, overwrite=false){
  const note = val(prefix+'Notiz');
  let pdfs = parsedPdfs;
  if(!pdfs){
    try{ pdfs = JSON.parse(document.getElementById(prefix+'Pdf').dataset.parsed || '[]'); }catch(e){ pdfs=[]; }
  }
  const merged = [note, ...(pdfs||[]).map(p=>p.text||'')].filter(Boolean).join('\n');
  if(!merged.trim()) return;
  const data = extractCustomerData(merged);
  setFieldValue(prefix+'Firma', data.firma, overwrite);
  setFieldValue(prefix+'Kontakt', data.kontakt, overwrite);
  setFieldValue(prefix+'Tel', data.tel, overwrite);

  if(overwrite || !val(prefix+'Bericht')){

  document.getElementById(prefix+'Overview').value = buildCustomerOverview({

    uhrzeit: val(prefix+'Uhrzeit'),
    interesse: val(prefix+'Interesse'),
    produkt: val(prefix+'Produkt'),
    nextStep: val(prefix+'Next'),
    angebotNr: val(prefix+'AngebotNr')
  });
}

function buildCalendarGrid(items){
  const monthDate = getKalenderMonthDate();
  const year = monthDate.getFullYear();
  const month = monthDate.getMonth();
  const first = new Date(year, month, 1);
  const startWeekday = (first.getDay()+6)%7;
  const last = new Date(year, month+1, 0).getDate();
  const counts = {};
  items.forEach(item=>{ counts[item.datum] = (counts[item.datum]||0)+1; });
  const cells = [];
  for(let i=0;i<startWeekday;i++) cells.push('<div style="min-height:92px;border:1px solid var(--line);border-radius:14px;opacity:.35"></div>');
  const today = new Date().toISOString().slice(0,10);
  for(let day=1; day<=last; day++){
    const date = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const count = counts[date]||0;
    const isToday = date===today;
    cells.push(`<button class="btn-ghost" style="min-height:92px;text-align:left;padding:10px;border-radius:14px;border:1px solid ${isToday?'#3d7bd9':'var(--line)'};background:${count?'#10233a':'transparent'}" onclick="setKalenderDate('${date}')"><div style="display:flex;justify-content:space-between;align-items:flex-start"><strong>${day}</strong>${count?'<span class="badge b-blue">'+count+'</span>':''}</div><div class="small" style="margin-top:10px">${count?count+' Termin(e)':'frei'}</div></button>`);
  }
  return `<div style="display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:8px">
    ${['Mo','Di','Mi','Do','Fr','Sa','So'].map(d=>`<div class="small" style="font-weight:800;text-align:center;padding:4px 0">${d}</div>`).join('')}
    ${cells.join('')}
  </div>`;
}

      datum,
      uhrzeit:x.reminderTime || x.uhrzeit || '',
      endzeit:'',
      nextStep:x.nextStep || '',
      angebotNr:x.angebotNr || '',
      notiz:x.notiz || ''
    });
  });
  state.wochenberichte.forEach(x=>{
    if(!x.datum) return;
    items.push({
      typ:'Bericht',
      color:'violet',
      id:x.id,
      source:'wochenbericht',
      sourceId:x.id,
      titel:x.firma || 'Wochenbericht',
      firma:x.firma || '',
      kontakt:x.kontakt || '',
      ort:x.ort || '',
      datum:x.datum,
      uhrzeit:'',
      endzeit:'',
      nextStep:x.next || '',
      angebotNr:'',
      notiz:x.text || ''
    });
  });
  items.sort((a,b)=>{
    const ka = (a.datum||'')+' '+(a.uhrzeit||'99:99');
    const kb = (b.datum||'')+' '+(b.uhrzeit||'99:99');
    return ka.localeCompare(kb);
  });
  return items;
}

function buildWeeklySummary(items){
  if(!items.length) return '';
  return items.map((x,i)=>{
    const head=[x.datum,x.firma].filter(Boolean).join(' · ');
    const meta=[x.ort,x.kontakt,x.thema].filter(Boolean).join(' · ');
    const parts=[`${i+1}. ${head}`];
    if(meta) parts.push(meta);
    if(x.text) parts.push(`Bericht: ${x.text}`);
    if(x.next) parts.push(`Nächste Schritte: ${x.next}`);
    return parts.join('\n');
  }).join('\n\n');
}

function renderWochenbericht(){
  const el=document.getElementById('wochenbericht');
  const items=state.wochenberichte.filter(x=>x.kw===currentWeekKey).sort((a,b)=>a.datum.localeCompare(b.datum));
  const weeklySummary = buildWeeklySummary(items);
  const today=new Date().toISOString().slice(0,10);
  el.innerHTML=`
    <div class="section-head"><div><h2>Wochenbericht</h2><p>${currentWeekKey} · nur aktuelle Woche gespeichert</p></div></div>
    <div class="split">
      <div>
        <div class="card">
          <div class="row row-tight"><div><label>KW</label><input value="${currentWeekKey}" readonly /></div><div><label>Datum</label><input id="wbDatum" type="date" value="${today}" /></div></div>
          <div class="row"><div><label>Firma / Kunde</label><input id="wbFirma" /></div><div><label>Ort</label><input id="wbOrt" /></div></div>
          <div class="row"><div><label>Ansprechpartner</label><input id="wbKontakt" /></div><div><label>Thema</label><input id="wbThema" /></div></div>
          <div><label>Tagesbericht / Gespräch</label><textarea id="wbText"></textarea></div>
          <div><label>Nächste Schritte</label><textarea id="wbNext"></textarea></div>
          <div class="row auto"><button class="btn-primary" id="wbSave">Eintrag speichern</button><button class="btn-secondary" id="wbSaveAnfrage">Als Anfrage speichern</button><button class="btn-success" id="wbSaveBoth">Beides speichern</button><button class="btn-secondary" id="wbPrintDay">Tagesbericht drucken</button><button class="btn-success" id="wbPrintWeek">Wochenbericht PDF</button></div>
          <div class="small" style="margin-top:10px">Wenn die Woche vorbei ist, bleibt nichts aus alten Wochen gespeichert.</div>
        </div>
      </div>
      <div>
        <div class="card">
          <div class="section-head"><div><h2>Einträge ${currentWeekKey}</h2><p>${items.length} gespeichert</p></div></div>
          <div id="wbList">${items.length?items.map(x=>`<div class="item"><h4>${esc(x.datum)} · ${esc(x.firma)}</h4><div class="meta"><span>${esc(x.ort||'')}</span><span>${esc(x.kontakt||'')}</span><span>${esc(x.thema||'')}</span></div><div>${esc(x.text||'')}</div>${x.next?`<hr class="soft"><div><strong>Nächste Schritte:</strong><br>${esc(x.next)}</div>`:''}<div class="row auto" style="margin-top:10px"><button class="btn-secondary" onclick="printWochenberichtTag('${x.id}')">Drucken</button><button class="btn-danger" onclick="deleteWochenbericht('${x.id}')">Löschen</button></div></div>`).join(''):'<div class="empty">Noch kein Wochenbericht erfasst.</div>'}</div>
        </div>
        <div class="card">
          <div class="section-head"><div><h2>Wochen-Gesamtbericht</h2><p>Automatisch aus allen Einträgen der Woche zusammengeführt.</p></div></div>
          <textarea readonly style="min-height:260px">${esc(weeklySummary || 'Noch keine Einträge in dieser Woche.')}</textarea>
        </div>
      </div>
    </div>`;
  function wbPayload(){
    const firma=val('wbFirma').trim();
    if(!firma){ alert('Firma fehlt'); return null; }
    return {id:uid(),kw:currentWeekKey,datum:val('wbDatum'),firma,ort:val('wbOrt'),kontakt:val('wbKontakt'),thema:val('wbThema'),text:val('wbText'),next:val('wbNext')};
  }
  function saveWbOnly(){
    const rec=wbPayload(); if(!rec) return;
    state.wochenberichte.push(rec);
    purgeTransientData(); save(); renderWochenbericht(); renderDashboard();
  }
  function saveWbAsAnfrage(alsoWeek){
    const rec=wbPayload(); if(!rec) return;
    if(alsoWeek) state.wochenberichte.push(rec);
    state.anfragen.unshift({
      id:uid(),
      firma:rec.firma||'',
      kontakt:rec.kontakt||'',
      tel:'',
      mail:'',
      status:'Neu',
      ort:rec.ort||'',
      adresse:'',
      plz:'',
      datum:rec.datum||'',
      uhrzeit:'',
      interesse:'',
      produkt:rec.thema||'',
      nextStep:rec.next||'',
      angebotNr:'',
      bericht:rec.text||'',
      reminderDate:rec.datum||'',
      reminderTime:'',
      uebersicht:buildCustomerOverview({firma:rec.firma,kontakt:rec.kontakt,ort:rec.ort,datum:rec.datum,produkt:rec.thema,nextStep:rec.next}),
      notiz:rec.text||'',
      pdfs:[],
      erstellt:new Date().toISOString()
    });
    purgeTransientData(); save(); renderWochenbericht(); renderCRM('anfragen','Anfragen',state.anfragen); renderDashboard();
  }
  document.getElementById('wbSave').onclick=saveWbOnly;
  document.getElementById('wbSaveAnfrage').onclick=()=>saveWbAsAnfrage(false);
  document.getElementById('wbSaveBoth').onclick=()=>saveWbAsAnfrage(true);
  document.getElementById('wbPrintDay').onclick=()=>{
    const tmp={id:'tmp',kw:currentWeekKey,datum:val('wbDatum'),firma:val('wbFirma'),ort:val('wbOrt'),kontakt:val('wbKontakt'),thema:val('wbThema'),text:val('wbText'),next:val('wbNext')};
    printWochenberichtRecord(tmp);
  };
  document.getElementById('wbPrintWeek').onclick=()=>printWochenberichtWoche();
}
function deleteWochenbericht(id){const i=state.wochenberichte.findIndex(x=>x.id===id); if(i<0) return; if(!confirm('Eintrag löschen?')) return; state.wochenberichte.splice(i,1); save(); renderWochenbericht(); renderDashboard();}
function printWochenberichtTag(id){const rec=state.wochenberichte.find(x=>x.id===id); if(rec) printWochenberichtRecord(rec);}
function printWochenberichtRecord(rec){
  const title=`Tagesbericht ${rec.datum}`;
  const body=`<h1>${title}</h1><div class="sub">AS Technical Solution GmbH · Robert Kutschke · ${currentWeekKey}</div><table><tbody><tr><th>Firma</th><td>${esc(rec.firma)}</td></tr><tr><th>Ort</th><td>${esc(rec.ort||'')}</td></tr><tr><th>Ansprechpartner</th><td>${esc(rec.kontakt||'')}</td></tr><tr><th>Thema</th><td>${esc(rec.thema||'')}</td></tr></tbody></table><h2>Bericht</h2><div class="block">${esc(rec.text||'')}</div><h2>Nächste Schritte</h2><div class="block">${esc(rec.next||'')}</div>`;
  openPrintDoc(title, body);
}
function printWochenberichtWoche(){
  const items=state.wochenberichte.filter(x=>x.kw===currentWeekKey).sort((a,b)=>a.datum.localeCompare(b.datum));
  const title=`Wochenbericht ${currentWeekKey}`;
  const summary = buildWeeklySummary(items);
  const body=`<h1>${title}</h1><div class="sub">AS Technical Solution GmbH · Robert Kutschke</div>${summary?`<h2>Wochen-Gesamtbericht</h2><div class="block">${esc(summary)}</div>`:''}${items.length?items.map(x=>`<div class="entry"><h2>${esc(x.datum)} · ${esc(x.firma)}</h2><div><strong>Ort:</strong> ${esc(x.ort||'')} · <strong>Ansprechpartner:</strong> ${esc(x.kontakt||'')} · <strong>Thema:</strong> ${esc(x.thema||'')}</div><div class="block" style="margin-top:8px">${esc(x.text||'')}</div>${x.next?`<div class="block" style="margin-top:8px"><strong>Nächste Schritte:</strong><br>${esc(x.next)}</div>`:''}</div>`).join(''):'<p>Keine Einträge vorhanden.</p>'}`;
  openPrintDoc(title, body);
}
function openPrintDoc(title, body){
  const w=window.open('','_blank');
  if(!w) return alert('Pop-up blockiert');
  w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${esc(title)}</title><style>body{font-family:Arial,sans-serif;color:#111;padding:28px}h1{font-size:26px;margin:0 0 8px}h2{font-size:18px;margin:18px 0 8px}.sub{color:#444;margin-bottom:18px}table{width:100%;border-collapse:collapse;margin-top:12px}th,td{border:1px solid #aaa;padding:8px;vertical-align:top;text-align:left;font-size:12px}th{background:#f2f2f2}.sum{margin-top:16px;font-size:18px;font-weight:700}.block{white-space:pre-wrap;border:1px solid #bbb;padding:10px;min-height:50px}.entry{margin:0 0 18px;padding-bottom:14px;border-bottom:1px solid #ccc}@media print{body{padding:10mm}}</style></head><body>${body}<script>window.onload=()=>setTimeout(()=>window.print(),150)<\/script></body></html>`);
  w.document.close();
}

function renderPdfList(pdfs){
  if(!pdfs.length) return '<div class="small">Keine PDFs hinterlegt.</div>';
  return `<div class="filelist">${pdfs.map((p,i)=>`<div class="filepill"><div><strong>${esc(p.name)}</strong>${p.text?`<div class="small">Text erkannt · ${Math.min((p.text||'').length,5000)} Zeichen</div>`:'<div class="small">Kein lesbarer Text gefunden</div>'}</div><div class="row auto"><button class="btn-ghost" onclick="openDataUrl('${jsQuote(p.data)}')">Öffnen</button><button class="btn-ghost" onclick="togglePdfText(this)">Text</button></div></div><div class="pdftext" style="display:none">${esc(p.text||'Kein auslesbarer Text gefunden.')}</div>`).join('')}</div>`;
}
function togglePdfText(btn){const next=btn.parentElement.parentElement.nextElementSibling; if(next) next.style.display=next.style.display==='none'?'block':'none';}
function openDataUrl(url){window.open(url,'_blank');}
function val(id){return document.getElementById(id)?.value||''}

async function readPdfFiles(fileList){
  const files=[...(fileList||[])];
  const out=[];
  for(const file of files){
    const data = await readAsDataURL(file);
    const text = await extractPdfText(file).catch(()=> '');
    out.push({name:file.name,data,text});
  }
  return out;
}
function readAsDataURL(file){return new Promise((res,rej)=>{const fr=new FileReader(); fr.onload=()=>res(fr.result); fr.onerror=rej; fr.readAsDataURL(file);});}
async function extractPdfText(file){
  if(!window['pdfjsLib']) return '';
  if(window.pdfjsLib.GlobalWorkerOptions) window.pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.3.136/pdf.worker.min.mjs';
  const buf = await file.arrayBuffer();
  const pdf = await window.pdfjsLib.getDocument({data:buf}).promise;
  let full='';
  for(let p=1;p<=pdf.numPages;p++){
    const page = await pdf.getPage(p);
    const content = await page.getTextContent();
    const strings = content.items.map(i=>i.str).filter(Boolean);
    full += strings.join(' ') + '\n';
  }
  return full.replace(/\s+/g,' ').trim();
}
