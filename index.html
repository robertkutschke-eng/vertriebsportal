<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Vertrieb Pro</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    :root{
      --bg:#08111f; --bg2:#0d1727; --card:#111d31; --line:#233754; --text:#edf4ff; --muted:#91a7c6;
      --blue:#4da3ff; --green:#22c55e; --orange:#f59e0b; --red:#ef4444; --purple:#8b5cf6;
      --header-h:64px; --mobile-nav-h:74px; --side-w:270px; --radius:18px; --shadow:0 20px 50px rgba(0,0,0,.28);
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:linear-gradient(180deg,#06101d,#0a1424);color:var(--text);font-family:Inter,Arial,Helvetica,sans-serif;min-height:100%}
    body{min-height:100dvh}
    button,input,select,textarea{font:inherit}
    button{cursor:pointer}
    a{color:var(--blue)}
    .app{min-height:100dvh;display:grid;grid-template-rows:var(--header-h) 1fr;background:transparent}
    .header{position:sticky;top:0;z-index:30;height:var(--header-h);display:flex;align-items:center;justify-content:space-between;padding:12px 18px;background:rgba(8,17,31,.9);backdrop-filter:blur(18px);border-bottom:1px solid rgba(35,55,84,.8)}
    .brand{display:flex;align-items:center;gap:12px}
    .logo{width:38px;height:38px;border-radius:12px;background:linear-gradient(135deg,#1d4ed8,#8b5cf6);display:grid;place-items:center;font-weight:800}
    .brand h1{font-size:18px;margin:0}
    .brand p{margin:0;color:var(--muted);font-size:12px}
    .shell{min-height:0;display:grid;grid-template-columns:1fr}
    .sidebar{display:none;padding:18px;border-right:1px solid rgba(35,55,84,.8);background:rgba(10,20,36,.66)}
    .nav-btn,.mnav-btn{width:100%;display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:14px;border:1px solid transparent;background:transparent;color:var(--muted);font-weight:700;text-align:left}
    .nav-btn.active,.mnav-btn.active{background:rgba(77,163,255,.14);border-color:rgba(77,163,255,.24);color:#fff}
    .nav-dot,.mnav-icon{width:10px;height:10px;border-radius:50%;background:currentColor;opacity:.75}
    .sidebar .section-title{margin:18px 0 10px;color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.08em}
    .main{min-width:0;min-height:0;overflow:auto;padding:18px 18px calc(var(--mobile-nav-h) + 24px)}
    .screen{display:none}
    .screen.active{display:block}
    .screen-inner{width:100%;max-width:1500px;margin:0 auto}
    .page-head{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap;margin-bottom:18px}
    .page-title{margin:0;font-size:30px;line-height:1.1}
    .page-sub{margin:6px 0 0;color:var(--muted);max-width:780px}
    .card,.item,.kpi{background:linear-gradient(180deg,rgba(18,28,46,.96),rgba(13,23,39,.96));border:1px solid rgba(35,55,84,.95);border-radius:var(--radius);box-shadow:var(--shadow)}
    .card{padding:18px}
    .kpi-grid,.grid{display:grid;gap:16px}
    .kpi-grid{grid-template-columns:repeat(1,minmax(0,1fr));margin-bottom:18px}
    .grid.two{grid-template-columns:repeat(1,minmax(0,1fr))}
    .grid.three{grid-template-columns:repeat(1,minmax(0,1fr))}
    .kpi{padding:18px}
    .kpi .label{font-size:12px;text-transform:uppercase;color:var(--muted);letter-spacing:.06em;font-weight:700}
    .kpi .value{font-size:32px;font-weight:800;margin-top:8px}
    .kpi .sub{font-size:13px;color:var(--muted);margin-top:6px}
    .card-title-row,.item-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;flex-wrap:wrap}
    .card h3{margin:0;font-size:18px}
    .item{padding:16px}
    .item + .item{margin-top:14px}
    .item-title{font-size:18px;font-weight:800}
    .item-sub{color:var(--muted);margin-top:4px;font-size:13px}
    .item-body{margin-top:12px;line-height:1.55;color:#dfeaff}
    .muted{color:var(--muted)}
    .empty{padding:18px;border:1px dashed rgba(145,167,198,.25);border-radius:14px;color:var(--muted)}
    .actions{display:flex;gap:10px;flex-wrap:wrap}
    .btn{border:none;border-radius:12px;padding:11px 16px;font-weight:800;color:#fff;background:rgba(145,167,198,.12)}
    .btn.primary{background:linear-gradient(135deg,#1d4ed8,#4da3ff)}
    .btn.green{background:linear-gradient(135deg,#0f766e,#22c55e)}
    .btn.orange{background:linear-gradient(135deg,#b45309,#f59e0b)}
    .btn.red{background:linear-gradient(135deg,#b91c1c,#ef4444)}
    .btn.ghost{background:transparent;border:1px solid rgba(145,167,198,.24);color:#dce8fb}
    .btn.small{padding:8px 12px;border-radius:10px;font-size:13px}
    .searchbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
    .searchbar .grow{flex:1 1 280px}
    .field input,.field select,.field textarea,.searchbar input,.searchbar select{width:100%;background:#09111f;border:1px solid rgba(35,55,84,.96);border-radius:12px;color:#fff;padding:12px 14px;outline:none}
    .field textarea{min-height:90px;resize:vertical}
    .field label{display:block;margin-bottom:8px;font-size:12px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);font-weight:700}
    .form-grid{display:grid;grid-template-columns:repeat(1,minmax(0,1fr));gap:14px}
    .field.full{grid-column:1 / -1}
    .badge{display:inline-flex;align-items:center;padding:5px 10px;border-radius:999px;font-size:12px;font-weight:800;border:1px solid transparent}
    .b-blue{background:rgba(77,163,255,.16);color:#8bc4ff;border-color:rgba(77,163,255,.3)}
    .b-green{background:rgba(34,197,94,.16);color:#69e18f;border-color:rgba(34,197,94,.3)}
    .b-orange{background:rgba(245,158,11,.16);color:#ffcb6b;border-color:rgba(245,158,11,.3)}
    .b-red{background:rgba(239,68,68,.16);color:#ff9898;border-color:rgba(239,68,68,.3)}
    .b-purple{background:rgba(139,92,246,.16);color:#c4a9ff;border-color:rgba(139,92,246,.3)}
    .table-wrap{overflow:auto;border:1px solid rgba(35,55,84,.9);border-radius:16px}
    table{width:100%;border-collapse:collapse;min-width:780px}
    th,td{padding:12px 14px;border-bottom:1px solid rgba(35,55,84,.8);text-align:left;font-size:14px;vertical-align:top}
    th{color:#b8cee9;background:rgba(9,17,31,.85);position:sticky;top:0}
    tr:last-child td{border-bottom:none}
    .mobile-nav{position:fixed;left:0;right:0;bottom:0;z-index:35;height:var(--mobile-nav-h);display:grid;grid-template-columns:repeat(8,minmax(0,1fr));gap:6px;padding:8px 10px calc(10px + env(safe-area-inset-bottom));background:rgba(8,17,31,.94);backdrop-filter:blur(18px);border-top:1px solid rgba(35,55,84,.9)}
    .mnav-btn{padding:8px 6px;justify-content:center;flex-direction:column;gap:5px;font-size:11px;text-align:center}
    .fab{position:fixed;right:18px;bottom:calc(var(--mobile-nav-h) + 18px);z-index:34;width:58px;height:58px;border:none;border-radius:50%;color:#fff;font-size:28px;font-weight:800;background:linear-gradient(135deg,#1d4ed8,#4da3ff);box-shadow:0 16px 35px rgba(29,78,216,.35)}
    .modal{position:fixed;inset:0;background:rgba(0,0,0,.62);display:none;align-items:flex-end;justify-content:center;z-index:60}
    .modal.open{display:flex}
    .sheet{width:min(100%,940px);max-height:92dvh;overflow:auto;background:linear-gradient(180deg,#111d31,#0d1727);border:1px solid rgba(35,55,84,.98);border-radius:24px 24px 0 0;padding:18px 18px calc(22px + env(safe-area-inset-bottom));box-shadow:var(--shadow)}
    .sheet-handle{width:54px;height:5px;border-radius:99px;background:rgba(145,167,198,.35);margin:0 auto 14px}
    .sheet-title{font-size:22px;font-weight:800;margin:0}
    .sheet-sub{margin:8px 0 18px;color:var(--muted)}
    .list .item{box-shadow:none}
    .pdf-list,.inline-list{display:grid;gap:10px}
    .pdf-row{padding:12px 14px;border:1px solid rgba(35,55,84,.85);border-radius:14px;background:rgba(9,17,31,.6)}
    .pdf-row strong{display:block}
    .pdf-snippet{margin-top:6px;color:#c7d7ee;font-size:13px;line-height:1.45}
    .hit{padding:12px 14px;border-radius:14px;background:rgba(9,17,31,.6);border:1px solid rgba(35,55,84,.85)}
    mark{background:rgba(245,158,11,.45);color:#fff;padding:0 2px;border-radius:4px}
    .note{padding:12px 14px;border-radius:14px;border:1px solid rgba(35,55,84,.95);background:rgba(9,17,31,.72)}
    .note.success{border-color:rgba(34,197,94,.28);background:rgba(34,197,94,.09)}
    .month-total{font-size:34px;font-weight:900;margin:8px 0 4px}
    @media (min-width:800px){
      .kpi-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
      .grid.two{grid-template-columns:repeat(2,minmax(0,1fr))}
      .grid.three{grid-template-columns:repeat(2,minmax(0,1fr))}
      .form-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
    }
    @media (min-width:1180px){
      .shell{grid-template-columns:var(--side-w) 1fr}
      .sidebar{display:block}
      .main{padding:24px}
      .mobile-nav{display:none}
      .fab{bottom:24px}
      .kpi-grid{grid-template-columns:repeat(4,minmax(0,1fr))}
      .grid.three{grid-template-columns:repeat(3,minmax(0,1fr))}
      .sheet{border-radius:24px;max-height:90dvh}
      .modal{align-items:center}
    }
  </style>
</head>
<body>
<div class="app">
  <header class="header">
    <div class="brand">
      <div class="logo">VP</div>
      <div>
        <h1>Vertrieb Pro</h1>
        <p>AS Technical Solution GmbH</p>
      </div>
    </div>
    <div class="actions">
      <button class="btn ghost small" onclick="exportBackup()">Backup</button>
      <button class="btn ghost small" onclick="importBackup()">Import</button>
    </div>
  </header>
  <div class="shell">
    <aside class="sidebar">
      <div class="section-title">Navigation</div>
      <div id="sidebarNav"></div>
      <div class="section-title">Kurzinfo</div>
      <div class="card">
        <h3 style="margin-top:0">Aktiver Fokus</h3>
        <div class="muted">Leads, Anfragen, Maschinen, Videos und Tagesspesen mit PDF-Auslesen und Suche.</div>
      </div>
    </aside>
    <main class="main" id="main"></main>
  </div>
</div>
<nav class="mobile-nav" id="mobileNav"></nav>
<button class="fab" id="fab" onclick="handleFab()">+</button>
<div class="modal" id="modal" onclick="if(event.target===this) closeModal()"><div class="sheet" id="sheet"></div></div>
<input type="file" id="backupInput" accept="application/json" hidden />
<script>

if(window.pdfjsLib){ pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js'; }
const jsPDF = window.jspdf && window.jspdf.jsPDF ? window.jspdf.jsPDF : null;
const LS_KEY = 'vertrieb-pro-v4';
const MONTHS = ['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
const NAVS = [
  {key:'dashboard',label:'Start'},
  {key:'leads',label:'Leads'},
  {key:'anfragen',label:'Anfragen'},
  {key:'aufgaben',label:'Aufgaben'},
  {key:'maschinen',label:'Maschinen'},
  {key:'videos',label:'Videos'},
  {key:'spesen',label:'Spesen'},
  {key:'kalender',label:'Kalender'}
];
function makeId(){ return Math.random().toString(36).slice(2,10); }
function todayISO(){ return new Date().toISOString().slice(0,10); }
function nowTime(){ const d=new Date(); return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0'); }
function esc(v){ return String(v ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function euro(n){ return Number(n||0).toLocaleString('de-DE',{style:'currency',currency:'EUR'}); }
function formatDate(iso){ if(!iso) return ''; const d=new Date(iso); return d.toLocaleDateString('de-DE'); }
function val(id){ return document.getElementById(id)?.value?.trim() || ''; }
function clone(obj){ return JSON.parse(JSON.stringify(obj)); }
function pageHead(title, sub, actions=''){ return `<div class="page-head"><div><h1 class="page-title">${esc(title)}</h1><p class="page-sub">${esc(sub)}</p></div><div class="actions">${actions}</div></div>`; }
function badgeClass(v){ return ({'Neu':'b-blue','Kontaktiert':'b-orange','Qualifiziert':'b-purple','Gewonnen':'b-green','Verloren':'b-red','In Bearbeitung':'b-orange','Angeboten':'b-blue','Erledigt':'b-green','Hoch':'b-red','Mittel':'b-orange','Niedrig':'b-green','Aktiv':'b-blue','Archiv':'b-purple','Reserviert':'b-orange','Verkauft':'b-green','Offen':'b-orange','Eingereicht':'b-blue','Bezahlt':'b-green'})[v] || 'b-blue'; }
function badge(v){ return `<span class="badge ${badgeClass(v)}">${esc(v)}</span>`; }
const seed = {
  active:'dashboard',
  monthOffset:0,
  leads:[{id:makeId(),firma:'Müller Fleischerei',kontakt:'Hans Müller',telefon:'+49 170 555123',email:'h.mueller@mueller.de',status:'Neu',prioritaet:'Hoch',notiz:'Interesse an Schneid- und Verpackungslösung.',naechsterSchritt:'Rückruf Mittwoch',pdfs:[],erstellt:todayISO()}],
  anfragen:[{id:makeId(),firma:'Bäckerei Weber',kontakt:'Sarah Weber',telefon:'+49 151 222333',email:'s.weber@baeckerei.de',status:'In Bearbeitung',prioritaet:'Mittel',thema:'Vakuummaschine',notiz:'Fragt nach Preis und Lieferzeit.',naechsterSchritt:'Anruf Freitag',pdfs:[],erstellt:todayISO()}],
  aufgaben:[{id:makeId(),titel:'Müller anrufen',faellig:todayISO(),prioritaet:'Hoch',notiz:'Demo abstimmen',erledigt:false}],
  hersteller:['GRAEF','BASTRA','Zermat','REX','Atosa'],
  maschinenDocs:[{id:makeId(),hersteller:'GRAEF',titel:'Masterline Preisliste',dokumentTyp:'Preisliste',preis:'',notiz:'',pdfName:'',pdfText:'',erstellt:todayISO()}],
  videos:[{id:makeId(),firma:'Müller Fleischerei',titel:'Vollautomat Demo',url:'https://example.com/demo',notiz:'Eigene Bezeichnung frei definierbar',erstellt:todayISO()}],
  spesen:[{id:makeId(),datum:todayISO(),kategorie:'Tagesspesen 8h',beschreibung:'Außendienst',betrag:14,startOrt:'Sendenhorst',zielOrt:'Münster',zeitStart:'08:00',zeitEnde:'16:30'}],
  spesenMonthDocs:{}
};
function normalizeCustomer(item){
  if(!item.pdfs){
    if(item.pdfName || item.pdfText) item.pdfs=[{name:item.pdfName||'PDF', text:item.pdfText||'', type:'PDF'}];
    else item.pdfs=[];
  }
  return item;
}
function loadState(){
  try{
    const raw=localStorage.getItem(LS_KEY);
    const merged = raw ? {...clone(seed), ...JSON.parse(raw)} : clone(seed);
    merged.leads=(merged.leads||[]).map(normalizeCustomer);
    merged.anfragen=(merged.anfragen||[]).map(normalizeCustomer);
    merged.hersteller = Array.from(new Set((merged.hersteller||[]).filter(Boolean)));
    merged.spesenMonthDocs = merged.spesenMonthDocs || {};
    return merged;
  }catch(e){ return clone(seed); }
}
let state = loadState();
function saveState(){ pruneSpesenData(); localStorage.setItem(LS_KEY, JSON.stringify(state)); }
function navHtml(active){ return NAVS.map(n=>`<button class="nav-btn ${n.key===active?'active':''}" onclick="setActive('${n.key}')"><span class="nav-dot"></span>${esc(n.label)}</button>`).join(''); }
function mobileNavHtml(active){ return NAVS.map(n=>`<button class="mnav-btn ${n.key===active?'active':''}" onclick="setActive('${n.key}')"><span class="mnav-icon"></span><span>${esc(n.label)}</span></button>`).join(''); }
function setActive(key){ state.active=key; saveState(); render(); }
function handleFab(){ ({dashboard:openQuickCreate,leads:()=>openCustomerForm('lead'),anfragen:()=>openCustomerForm('anfrage'),aufgaben:openTaskForm,maschinen:openMaschinenForm,videos:openVideoForm,spesen:openSpesenForm,kalender:openTaskForm}[state.active]||openQuickCreate)(); }
function render(){ document.getElementById('sidebarNav').innerHTML=navHtml(state.active); document.getElementById('mobileNav').innerHTML=mobileNavHtml(state.active); document.getElementById('main').innerHTML = Object.fromEntries(NAVS.map(n=>[n.key,`<section class="screen ${state.active===n.key?'active':''}"><div class="screen-inner" id="view-${n.key}"></div></section>`]))[state.active]; ({dashboard:renderDashboard,leads:renderLeads,anfragen:renderAnfragen,aufgaben:renderAufgaben,maschinen:renderMaschinen,videos:renderVideos,spesen:renderSpesen,kalender:renderKalender}[state.active]||renderDashboard)(); }
function openModal(html){ document.getElementById('sheet').innerHTML = `<div class="sheet-handle"></div>${html}`; document.getElementById('modal').classList.add('open'); }
function closeModal(){ document.getElementById('modal').classList.remove('open'); document.getElementById('sheet').innerHTML=''; tempSession=[]; tempMonthDocs=[]; }
function sheetFrame(title, sub, body){ return `<h2 class="sheet-title">${esc(title)}</h2><div class="sheet-sub">${esc(sub)}</div>${body}`; }
function downloadFile(name, content, type){ const blob=new Blob([content],{type}); const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download=name; a.click(); setTimeout(()=>URL.revokeObjectURL(url),500); }
function exportBackup(){ downloadFile('vertrieb-pro-backup.json', JSON.stringify(state,null,2), 'application/json;charset=utf-8'); }
function importBackup(){ document.getElementById('backupInput').click(); }
document.getElementById('backupInput').addEventListener('change', async (e)=>{ const file=e.target.files?.[0]; if(!file) return; try{ const parsed=JSON.parse(await file.text()); state={...clone(seed), ...parsed}; state.leads=(state.leads||[]).map(normalizeCustomer); state.anfragen=(state.anfragen||[]).map(normalizeCustomer); saveState(); render(); alert('Backup importiert.'); }catch(err){ alert('Import fehlgeschlagen.'); } e.target.value=''; });
function attachmentSearchText(item){ return (item.pdfs||[]).map(p=>[p.name,p.text,p.type].join(' ')).join(' '); }
function pdfSnippet(text, q=''){
  const clean = (text||'').replace(/\s+/g,' ').trim();
  if(!clean) return 'Kein auslesbarer Text gefunden.';
  if(!q) return esc(clean.slice(0,360)) + (clean.length>360 ? ' …' : '');
  const idx = clean.toLowerCase().indexOf(q.toLowerCase());
  const start = Math.max(0, idx - 120);
  const part = clean.slice(start, start + 320);
  return highlight(part, q) + (start + 320 < clean.length ? ' …' : '');
}
function highlight(text, q){ if(!q) return esc(text||''); const safe=q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); return esc(text||'').replace(new RegExp(safe,'ig'), m=>`<mark>${m}</mark>`); }
async function extractPdfText(file){
  if(!window.pdfjsLib || !pdfjsLib.getDocument) throw new Error('PDF.js nicht geladen');
  const buf = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: buf, useWorker: true, isEvalSupported: false }).promise;
  let pages = [];
  for(let i=1;i<=pdf.numPages;i++){
    const page = await pdf.getPage(i);
    const tc = await page.getTextContent({ normalizeWhitespace: true, disableCombineTextItems: false });
    const items = (tc.items || []).map(it => ({
      str: (it.str || '').trim(),
      x: (it.transform && it.transform[4]) || 0,
      y: (it.transform && it.transform[5]) || 0
    })).filter(it => it.str);
    items.sort((a,b) => Math.abs(b.y - a.y) > 2 ? b.y - a.y : a.x - b.x);
    let currentY = null;
    let current = [];
    let lines = [];
    for(const it of items){
      if(currentY === null || Math.abs(it.y - currentY) <= 2.5){
        current.push(it.str);
        if(currentY === null) currentY = it.y;
      } else {
        lines.push(current.join(' '));
        current = [it.str];
        currentY = it.y;
      }
    }
    if(current.length) lines.push(current.join(' '));
    pages.push(lines.join('\n'));
  }
  return pages.join('\n\n').replace(/[ \t]+/g,' ').replace(/\n{3,}/g,'\n\n').trim();
}
function guessDocMeta(text,name=''){ const joined = `${name} ${text}`.replace(/\s+/g,' ');
  const priceMatch = joined.match(/(?:€|EUR)?\s?([0-9]{1,3}(?:[\. ][0-9]{3})*(?:,[0-9]{2})?)/i);
  const modelMatch = joined.match(/\b([A-Z]{1,4}[\- ]?[0-9]{2,5}[A-Z]{0,3})\b/);
  return { preis: priceMatch ? priceMatch[1].replace(/ /g,'') : '', modell: modelMatch ? modelMatch[1] : '' };
}
let tempSession=[]; let tempMonthDocs=[];
function startTempSession(items=[]){ tempSession = clone(items||[]); }
function startMonthDocSession(monthKey){ tempMonthDocs = clone(state.spesenMonthDocs[monthKey] || []); }
async function handleTempPdfUpload(input, kind='pdf'){
  const files = Array.from(input.files || []);
  if(!files.length) return;
  for(const file of files){
    let text = '';
    let parseHint = '';
    try{
      text = await extractPdfText(file);
      if(!text) parseHint = 'Kein auslesbarer Text gefunden. Wahrscheinlich Scan-PDF oder Bild-PDF.';
    }catch(e){
      parseHint = 'PDF konnte nicht gelesen werden.';
    }
    const meta = guessDocMeta(text, file.name);
    tempSession.push({id:makeId(),name:file.name,text,parseHint,typ:kind==='maschine'?'Maschinen-PDF':'PDF',modell:meta.modell||'',preis:meta.preis||''});
  }
  input.value='';
  renderTempPdfList();
}
async function handleMonthPdfUpload(input){
  const files = Array.from(input.files || []);
  if(!files.length) return;
  for(const file of files){
    let text = '';
    let parseHint = '';
    try{
      text = await extractPdfText(file);
      if(!text) parseHint = 'Kein auslesbarer Text gefunden. Wahrscheinlich Scan-PDF oder Bild-PDF.';

function exportSpesenPdf(){
  if(!jsPDF){
    alert('PDF-Export ist in der lokalen Vorschau ohne Internet nicht verfügbar. Online über GitHub Pages funktioniert es.');
    return;
  }
  const sel=selectedMonth();
  const rows=(state.spesen||[]).filter(x=>(x.datum||'').startsWith(sel.key)).sort((a,b)=>(a.datum+a.zeitStart).localeCompare(b.datum+b.zeitStart));
  const total=rows.reduce((s,x)=>s+Number(x.betrag||0),0);
  const docs=state.spesenMonthDocs[sel.key]||[];
  const doc=new jsPDF({orientation:'l',unit:'mm',format:'a4'});
  const pageH=210, left=12, right=285, lineH=5;
  const cols={datum:12, typ:38, start:82, ziel:122, zeit:162, beschr:198, betrag:284};
  let y=16;
  function addHeader(){
    doc.setFont('helvetica','bold');
    doc.setFontSize(18);
    doc.text(`Spesen ${MONTHS[sel.month]} ${sel.year}`, left, y);
    doc.setFontSize(11);
    doc.setFont('helvetica','normal');
    doc.text('AS Technical Solution GmbH', left, y+7);
    doc.text('Robert Kutschke', left, y+13);
    doc.text(`Erstellt am: ${new Date().toLocaleDateString('de-DE')}`, right, y+7, {align:'right'});
    doc.text(`Monatsgesamtbetrag: ${euro(total)}`, right, y+13, {align:'right'});
    y += 22;
    doc.setDrawColor(180);
    doc.line(left, y, right, y);
    y += 6;
    doc.setFont('helvetica','bold');
    doc.setFontSize(9.5);
    doc.text('Datum', cols.datum, y);
    doc.text('Typ', cols.typ, y);
    doc.text('Startort', cols.start, y);
    doc.text('Zielort', cols.ziel, y);
    doc.text('Zeit', cols.zeit, y);
    doc.text('Beschreibung', cols.beschr, y);
    doc.text('Betrag', cols.betrag, y, {align:'right'});
    y += 3;
    doc.line(left, y, right, y);
    y += 5;
    doc.setFont('helvetica','normal');
    doc.setFontSize(9);
  }
  addHeader();
  rows.forEach(r=>{
    const datum=formatDate(r.datum);
    const typLines=doc.splitTextToSize(r.kategorie||'', 40);
    const startLines=doc.splitTextToSize(r.startOrt||'', 36);
    const zielLines=doc.splitTextToSize(r.zielOrt||'', 36);
    const zeitLines=doc.splitTextToSize([r.zeitStart||'', r.zeitEnde||''].filter(Boolean).join(' - '), 30);
    const descLines=doc.splitTextToSize(r.beschreibung||'', 72);
    const rowLines=Math.max(1,typLines.length,startLines.length,zielLines.length,zeitLines.length,descLines.length);
    const rowH=rowLines*lineH + 2;
    if(y + rowH > pageH - 18){ doc.addPage(); y=16; addHeader(); }
    doc.text(datum, cols.datum, y);
    doc.text(typLines, cols.typ, y);
    doc.text(startLines, cols.start, y);
    doc.text(zielLines, cols.ziel, y);
    doc.text(zeitLines, cols.zeit, y);
    doc.text(descLines, cols.beschr, y);
    doc.text(euro(r.betrag), cols.betrag, y, {align:'right'});
    y += rowH;
    doc.setDrawColor(225);
    doc.line(left, y-1, right, y-1);
    y += 2;
  });
  if(docs.length){
    doc.addPage();
    y=16;
    doc.setFont('helvetica','bold');
    doc.setFontSize(16);
    doc.text(`Zusatz-PDFs ${MONTHS[sel.month]} ${sel.year}`, left, y);
    y += 10;
    doc.setFont('helvetica','normal');
    doc.setFontSize(10);
    docs.forEach((p,idx)=>{
      const title=`${idx+1}. ${p.name}`;
      const body=(p.text||'').trim() || p.parseHint || 'Kein auslesbarer Text gefunden.';
      const bodyLines=doc.splitTextToSize(body.slice(0,1800), 265);
      const blockH=8 + bodyLines.length*4 + 6;
      if(y + blockH > pageH - 14){ doc.addPage(); y=16; }
      doc.setFont('helvetica','bold');
      doc.text(title, left, y);
      y += 6;
      doc.setFont('helvetica','normal');
      doc.text(bodyLines, left, y);
      y += bodyLines.length*4 + 6;
      doc.setDrawColor(220);
      doc.line(left, y-2, right, y-2);
      y += 4;
    });
  }
  doc.save(`spesen-${sel.key}.pdf`);
}
